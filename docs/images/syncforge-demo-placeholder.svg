<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450" role="img" aria-label="SyncForge demo placeholder">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#2d5a87"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)" rx="12"/>
  <text x="400" y="140" text-anchor="middle" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="bold">SyncForge</text>
  <text x="400" y="180" text-anchor="middle" fill="#b8d4f0" font-family="Arial, Helvetica, sans-serif" font-size="18">Offline → Sync → Conflict resolve</text>
  <rect x="120" y="220" width="560" height="120" fill="#0f2847" rx="8" stroke="#4a90d9" stroke-width="2"/>
  <text x="400" y="265" text-anchor="middle" fill="#e8f4ff" font-family="Arial, Helvetica, sans-serif" font-size="16">Demo GIF: docs/images/syncforge-demo.gif</text>
  <text x="400" y="300" text-anchor="middle" fill="#8eb8e8" font-family="Arial, Helvetica, sans-serif" font-size="14">Record with :sample + :mock-server — see docs/images/README.md</text>
  <circle cx="200" cy="380" r="28" fill="#3d7ab8"/>
  <text x="200" y="386" text-anchor="middle" fill="#fff" font-family="Arial" font-size="22">📴</text>
  <text x="200" y="420" text-anchor="middle" fill="#b8d4f0" font-family="Arial" font-size="12">Offline</text>
  <circle cx="400" cy="380" r="28" fill="#3d7ab8"/>
  <text x="400" y="386" text-anchor="middle" fill="#fff" font-family="Arial" font-size="22">↻</text>
  <text x="400" y="420" text-anchor="middle" fill="#b8d4f0" font-family="Arial" font-size="12">Sync</text>
  <circle cx="600" cy="380" r="28" fill="#3d7ab8"/>
  <text x="600" y="386" text-anchor="middle" fill="#fff" font-family="Arial" font-size="22">⚡</text>
  <text x="600" y="420" text-anchor="middle" fill="#b8d4f0" font-family="Arial" font-size="12">Conflict</text>
</svg>