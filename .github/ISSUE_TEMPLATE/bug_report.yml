name: Bug report
description: Something broken in SyncForge or the published artifacts
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Include versions and a minimal repro when possible.

  - type: input
    id: version
    attributes:
      label: SyncForge version
      placeholder: "1.0.0"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Android (plain / non-KMP)
        - Kotlin Multiplatform
        - iOS (KMP framework)
        - JVM / desktop
        - macOS
        - Gradle plugin / publish
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: "1. … 2. …"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / stack trace
      render: shell
    validations:
      required: false