name: Web E2E (nightly)

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

concurrency:
  group: web-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-e2e:
    name: Headless browser smoke (:sample-web)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v2
        id: setup-chrome
        with:
          install-dependencies: true

      - name: Run web E2E (mock-server + headless push/pull)
        env:
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
          PORT: "18080"
        run: ./gradlew webE2e --no-daemon

      - name: Upload debug logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: web-e2e-logs-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            /tmp/syncforge-mock-server-web.log