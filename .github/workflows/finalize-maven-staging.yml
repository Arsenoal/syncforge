name: Finalize Maven Staging

# Run manually to surface rc.2/rc.3 uploads in Central Portal → Deployments
# after Gradle publish succeeded but deployments were missing.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  finalize:
    name: Transfer OSSRH staging to Central Portal
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Drop invalid staging and promote remaining uploads
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          FINALIZE_CURRENT_IP: "false"
          DROP_INVALID_ON_FAILURE: "true"
        run: bash .github/scripts/finalize-maven-central-staging.sh studio.syncforge