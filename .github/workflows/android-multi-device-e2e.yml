name: Android Multi-Device E2E (nightly)

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: android-multi-device-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  multi-device-e2e:
    name: Two emulators + mock-server
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Android SDK packages
        uses: android-actions/setup-android@v3

      - name: Create AVDs
        run: |
          echo "no" | avdmanager create avd -n Pixel_6_A -k "system-images;android-29;google_apis;x86_64" -d pixel_6 --force
          echo "no" | avdmanager create avd -n Pixel_6_B -k "system-images;android-29;google_apis;x86_64" -d pixel_6 --force

      - name: Start two emulators
        run: |
          export ANDROID_SDK_ROOT="$ANDROID_HOME"
          export PATH="$ANDROID_SDK_ROOT/emulator:$ANDROID_SDK_ROOT/platform-tools:$PATH"
          nohup emulator -avd Pixel_6_A -port 5554 -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim > /tmp/emu-a.log 2>&1 &
          nohup emulator -avd Pixel_6_B -port 5556 -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim > /tmp/emu-b.log 2>&1 &
          adb wait-for-device
          adb -s emulator-5556 wait-for-device
          adb devices
          for i in $(seq 1 60); do
            if adb -s emulator-5554 shell getprop sys.boot_completed 2>/dev/null | grep -q 1 && \
               adb -s emulator-5556 shell getprop sys.boot_completed 2>/dev/null | grep -q 1; then
              echo "Both emulators booted"
              exit 0
            fi
            sleep 5
          done
          echo "Emulator boot timeout"
          tail -30 /tmp/emu-a.log || true
          tail -30 /tmp/emu-b.log || true
          exit 1

      - name: Run multi-device E2E
        run: ./gradlew androidMultiDeviceE2e --no-daemon

      - name: Upload emulator logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-multi-device-e2e-logs-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            /tmp/emu-a.log
            /tmp/emu-b.log