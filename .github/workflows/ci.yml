name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: Android + JVM
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Compile and test (Android + JVM)
        run: |
          ./gradlew \
            :syncforge:compileDebugKotlinAndroid \
            :syncforge:compileKotlinJvm \
            :syncforge:jvmTest \
            :syncforge-persistence:compileDebugKotlinAndroid \
            :syncforge-persistence:compileKotlinJvm \
            :syncforge-annotations:compileKotlin \
            :syncforge-ksp:compileKotlin \
            :sample:compileDebugKotlin \
            --no-daemon

      - name: Verify local Maven publish (Android + JVM targets)
        run: ./gradlew publishAllToMavenLocal --no-daemon