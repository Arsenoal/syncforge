name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: Android + JVM
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Compile and test (Android + JVM)
        run: |
          ./gradlew \
            :syncforge:compileDebugKotlinAndroid \
            :syncforge:compileKotlinJvm \
            :syncforge:jvmTest \
            :syncforge-persistence:compileDebugKotlinAndroid \
            :syncforge-persistence:compileKotlinJvm \
            :syncforge-annotations:compileDebugKotlinAndroid \
            :syncforge-annotations:compileKotlinJvm \
            :syncforge-ksp:compileKotlin \
            :sample:compileDebugKotlin \
            --no-daemon

      - name: Verify local Maven publish (Android + JVM targets)
        run: ./gradlew publishAllToMavenLocal --no-daemon

  android-e2e:
    name: Android E2E (emulator + mock-server)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run connected Android E2E tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          target: default
          profile: pixel_6
          disable-animations: true
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: bash scripts/run-android-e2e.sh

  ios-e2e:
    name: iOS E2E (Simulator + mock-server)
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Grant execute permission for iOS E2E script
        run: chmod +x scripts/run-ios-e2e.sh

      - name: Run XCUITest multi-entity UI tests
        run: bash scripts/run-ios-e2e.sh