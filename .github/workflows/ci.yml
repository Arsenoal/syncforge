name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: Android + JVM
    # Release commits push main then tag v* — Publish Release already compiles and tests on macOS.
    if: ${{ github.event_name == 'pull_request' || github.event.head_commit == null || !startsWith(github.event.head_commit.message, 'Release ') }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Release sign-off (unit tests + consumer smoke)
        run: ./gradlew verifyReleaseSignOff --no-daemon

      - name: Desktop E2E (mock-server + JVM smoke)
        run: ./gradlew desktopE2e --no-daemon

  android-e2e:
    name: Android E2E (emulator + mock-server)
    if: ${{ github.event_name == 'pull_request' || github.event.head_commit == null || !startsWith(github.event.head_commit.message, 'Release ') }}
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run connected Android E2E tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          target: default
          profile: pixel_6
          disable-animations: true
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: ./gradlew androidE2e --no-daemon

  ios-e2e:
    name: iOS E2E (Simulator + mock-server)
    if: ${{ github.event_name == 'pull_request' || github.event.head_commit == null || !startsWith(github.event.head_commit.message, 'Release ') }}
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Build mock-server
        run: ./gradlew :mock-server:installDist --no-daemon

      - name: Boot iOS Simulator
        run: ./gradlew iosE2ePrepareSimulator --no-daemon

      - name: Start mock-server
        run: |
          set -euo pipefail
          PORT="$(cat build/ios-e2e/port.txt)"
          LOG="build/ios-e2e/mock-server.log"
          mock-server/build/install/mock-server/bin/mock-server > "$LOG" 2>&1 &
          echo $! > build/ios-e2e/mock-server.pid
          for _ in $(seq 1 30); do
            if curl -sf "http://127.0.0.1:${PORT}/health" >/dev/null; then
              echo "Mock server healthy on port ${PORT}"
              exit 0
            fi
            sleep 1
          done
          echo "Mock server failed to start"
          tail -50 "$LOG" || true
          exit 1

      - name: Run XCUITest multi-entity UI tests
        env:
          MOCK_SERVER_BASE_URL: http://127.0.0.1:8080
          E2E_TESTING: "1"
          E2E_SWIFT_STUB: "1"
        run: ./gradlew iosE2eXcuiTest --no-daemon

      - name: Stop mock-server
        if: always()
        run: |
          if [ -f build/ios-e2e/mock-server.pid ]; then
            kill "$(cat build/ios-e2e/mock-server.pid)" 2>/dev/null || true
          fi

      - name: Collect iOS E2E debug info
        if: failure()
        run: |
          mkdir -p build/ios-e2e
          {
            echo "=== All simulators ==="
            xcrun simctl list devices
            echo
            echo "=== Booted simulators ==="
            xcrun simctl list devices booted
          } > build/ios-e2e/simulator-devices.txt 2>&1 || true

      - name: Upload iOS E2E debug artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-e2e-debug-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            build/ios-e2e/mock-server.log
            build/ios-e2e/destination.txt
            build/ios-e2e/port.txt
            build/ios-e2e/simulator-devices.txt
            build/ios-e2e/SyncForgeTasks.xcresult