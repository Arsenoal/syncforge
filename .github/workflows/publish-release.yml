name: Publish Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to publish (e.g. v0.9.0-rc.5)"
        required: true
        default: "v0.9.0-rc.5"

permissions:
  contents: read

jobs:
  publish-macos:
    name: Maven Central (all KMP targets)
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      # workflow_dispatch checks out main so publish scripts/workflow fixes are available
      # even when re-publishing an older tag (e.g. v0.9.0-rc.3). Version comes from the tag input.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && 'main' || github.ref }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Set release version from tag
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          if grep -q '^syncforge\.version=' gradle.properties; then
            sed -i.bak "s/^syncforge\.version=.*/syncforge.version=${VERSION}/" gradle.properties
          else
            echo "syncforge.version=${VERSION}" >> gradle.properties
          fi

      - name: Drop open staging repositories
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          FINALIZE_CURRENT_IP: "false"
          DROP_ALL_OPEN_STAGING: "true"
          DROP_INVALID_ON_FAILURE: "true"
        run: bash .github/scripts/finalize-maven-central-staging.sh studio.syncforge

      - name: Compile all Kotlin targets (incl. iOS / macOS)
        run: |
          ./gradlew \
            :syncforge:compileDebugKotlinAndroid \
            :syncforge:compileKotlinJvm \
            :syncforge:compileKotlinIosSimulatorArm64 \
            :syncforge:compileKotlinMacosArm64 \
            :syncforge-persistence:compileDebugKotlinAndroid \
            :syncforge-persistence:compileKotlinJvm \
            :syncforge-persistence:compileKotlinIosSimulatorArm64 \
            :syncforge-persistence:compileKotlinMacosArm64 \
            :syncforge-annotations:compileDebugKotlinAndroid \
            :syncforge-annotations:compileKotlinJvm \
            :syncforge-annotations:compileKotlinIosSimulatorArm64 \
            :syncforge-annotations:compileKotlinMacosArm64 \
            :syncforge-ksp:compileKotlin \
            --no-daemon

      - name: Test JVM
        run: ./gradlew :syncforge:jvmTest :syncforge-persistence:jvmTest --no-daemon

      - name: Prepare GPG signing key
        env:
          SIGNING_IN_MEMORY_KEY: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          SIGNING_IN_MEMORY_KEY_B64: ${{ secrets.SIGNING_IN_MEMORY_KEY_B64 }}
          SIGNING_IN_MEMORY_KEY_ID: ${{ secrets.SIGNING_IN_MEMORY_KEY_ID }}
          SIGNING_IN_MEMORY_KEY_PASSWORD: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          KEY_FILE_ARMOR="${RUNNER_TEMP}/gpg-signing-key.asc"
          KEY_FILE="${RUNNER_TEMP}/gpg-signing-key.gpg"
          if [ -n "${SIGNING_IN_MEMORY_KEY_B64:-}" ]; then
            echo "Using SIGNING_IN_MEMORY_KEY_B64"
            printf '%s' "$SIGNING_IN_MEMORY_KEY_B64" | base64 --decode > "$KEY_FILE_ARMOR"
          elif [ -n "${SIGNING_IN_MEMORY_KEY:-}" ]; then
            echo "Using SIGNING_IN_MEMORY_KEY"
            printf '%s\n' "$SIGNING_IN_MEMORY_KEY" > "$KEY_FILE_ARMOR"
          else
            echo "::error::No signing key secret found on this repository."
            echo "Add SIGNING_IN_MEMORY_KEY_B64 (recommended) or SIGNING_IN_MEMORY_KEY at:"
            echo "https://github.com/${{ github.repository }}/settings/secrets/actions"
            echo "Name must match exactly — not SIGN_IN_MEMORY_KEY."
            exit 1
          fi
          if ! grep -q "BEGIN PGP PRIVATE KEY BLOCK" "$KEY_FILE_ARMOR"; then
            echo "::error::Signing key file is not an armored PGP private key"
            exit 1
          fi
          # Gradle signing.secretKeyRingFile expects a binary keyring, not armored ASCII.
          gpg --batch --yes --dearmor -o "$KEY_FILE" < "$KEY_FILE_ARMOR"
          GNUPGHOME="$(mktemp -d)"
          chmod 700 "$GNUPGHOME"
          export GNUPGHOME
          gpg --batch --import "$KEY_FILE_ARMOR"
          KEY_ID="$(gpg --list-secret-keys --keyid-format long 2>/dev/null | awk '/^sec/ {split($2, parts, "/"); print parts[2]; exit}')"
          KEY_ID="${KEY_ID: -8}"
          if [ -n "${SIGNING_IN_MEMORY_KEY_ID:-}" ] && echo "${SIGNING_IN_MEMORY_KEY_ID}" | grep -qE '^[0-9A-Fa-f]{8}$'; then
            KEY_ID="${SIGNING_IN_MEMORY_KEY_ID}"
          fi
          if ! echo "$KEY_ID" | grep -qE '^[0-9A-Fa-f]{8}$'; then
            echo "::error::Could not derive a valid 8-char GPG key id. Set SIGNING_IN_MEMORY_KEY_ID to 1DF1CDEB (not Sonatype username)."
            exit 1
          fi
          echo "Signing key ready (armored=$(wc -c < "$KEY_FILE_ARMOR" | tr -d ' ') bytes, binary=$(wc -c < "$KEY_FILE" | tr -d ' ') bytes, keyId=${KEY_ID})"
          {
            echo "ORG_GRADLE_PROJECT_signing_secretKeyRingFile=${KEY_FILE}"
            echo "ORG_GRADLE_PROJECT_signing_keyId=${KEY_ID}"
          } >> "$GITHUB_ENV"
          {
            echo "signing.secretKeyRingFile=${KEY_FILE}"
            echo "signing.keyId=${KEY_ID}"
          } >> gradle.properties
          if [ -n "${SIGNING_IN_MEMORY_KEY_PASSWORD:-}" ]; then
            echo "ORG_GRADLE_PROJECT_signing_password=${SIGNING_IN_MEMORY_KEY_PASSWORD}" >> "$GITHUB_ENV"
            echo "signing.password=${SIGNING_IN_MEMORY_KEY_PASSWORD}" >> gradle.properties
          fi

      - name: Publish to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralPublishing: "true"
          ORG_GRADLE_PROJECT_signAllPublications: "true"
          ORG_GRADLE_PROJECT_org.gradle.parallel: "false"
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
        run: |
          set -euo pipefail
          KEY_FILE="${RUNNER_TEMP}/gpg-signing-key.gpg"
          KEY_ID="$(grep '^signing.keyId=' gradle.properties | tail -1 | cut -d= -f2-)"
          if [ ! -f "$KEY_FILE" ] || [ -z "$KEY_ID" ]; then
            echo "::error::Signing key missing — Prepare GPG signing key step may have failed"
            exit 1
          fi
          SIGNING_ARGS=(
            "-Psigning.secretKeyRingFile=${KEY_FILE}"
            "-Psigning.keyId=${KEY_ID}"
          )
          if grep -q '^signing.password=' gradle.properties; then
            SIGNING_PASSWORD="$(grep '^signing.password=' gradle.properties | tail -1 | cut -d= -f2-)"
            SIGNING_ARGS+=("-Psigning.password=${SIGNING_PASSWORD}")
          fi
          ./gradlew verifyPublishSigning publishAllToMavenCentral \
            --no-daemon --no-parallel "${SIGNING_ARGS[@]}"

      - name: Transfer staging upload to Central Portal
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          FINALIZE_CURRENT_IP: "true"
          DROP_INVALID_ON_FAILURE: "true"
          STRICT: "true"
        run: bash .github/scripts/finalize-maven-central-staging.sh studio.syncforge