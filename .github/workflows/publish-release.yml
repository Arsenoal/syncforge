name: Publish Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to publish (e.g. v0.9.0-rc.5)"
        required: true
        default: "v0.9.0-rc.5"
      publish_mode:
        description: "full = all artifacts; supplemental = only artifacts missing on Maven Central"
        required: true
        default: "supplemental"
        type: choice
        options:
          - supplemental
          - full

permissions:
  contents: read

jobs:
  publish-macos:
    name: Maven Central (all KMP targets)
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      # workflow_dispatch checks out main so publish scripts/workflow fixes are available
      # even when re-publishing an older tag (e.g. v0.9.0-rc.3). Version comes from the tag input.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && 'main' || github.ref }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Set release version from tag
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          if grep -q '^syncforge\.version=' gradle.properties; then
            sed -i.bak "s/^syncforge\.version=.*/syncforge.version=${VERSION}/" gradle.properties
          else
            echo "syncforge.version=${VERSION}" >> gradle.properties
          fi

      - name: Plan supplemental publish
        if: github.event_name == 'workflow_dispatch' && inputs.publish_mode == 'supplemental'
        id: supplemental_plan
        run: |
          set -euo pipefail
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          bash .github/scripts/plan-supplemental-maven-publish.sh "$VERSION" "${RUNNER_TEMP}"

      - name: Drop open staging repositories
        if: github.event_name != 'workflow_dispatch' || inputs.publish_mode == 'full' || steps.supplemental_plan.outputs.has_work == 'true'
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          FINALIZE_CURRENT_IP: "false"
          DROP_ALL_OPEN_STAGING: "true"
          DROP_INVALID_ON_FAILURE: "true"
        run: bash .github/scripts/finalize-maven-central-staging.sh studio.syncforge

      - name: Compile all Kotlin targets (incl. iOS / macOS)
        if: github.event_name != 'workflow_dispatch' || inputs.publish_mode == 'full'
        run: |
          ./gradlew \
            :syncforge:compileDebugKotlinAndroid \
            :syncforge:compileKotlinJvm \
            :syncforge:compileKotlinIosSimulatorArm64 \
            :syncforge:compileKotlinMacosArm64 \
            :syncforge-persistence:compileDebugKotlinAndroid \
            :syncforge-persistence:compileKotlinJvm \
            :syncforge-persistence:compileKotlinIosSimulatorArm64 \
            :syncforge-persistence:compileKotlinMacosArm64 \
            :syncforge-annotations:compileDebugKotlinAndroid \
            :syncforge-annotations:compileKotlinJvm \
            :syncforge-annotations:compileKotlinIosSimulatorArm64 \
            :syncforge-annotations:compileKotlinMacosArm64 \
            :syncforge-ksp:compileKotlin \
            --no-daemon

      - name: Test JVM
        if: github.event_name != 'workflow_dispatch' || inputs.publish_mode == 'full'
        run: ./gradlew :syncforge:jvmTest :syncforge-persistence:jvmTest --no-daemon

      - name: Compile supplemental publish targets
        if: github.event_name == 'workflow_dispatch' && inputs.publish_mode == 'supplemental' && steps.supplemental_plan.outputs.has_work == 'true'
        run: |
          set -euo pipefail
          COMPILE_FILE="${{ steps.supplemental_plan.outputs.compile_tasks_file }}"
          ROOT_TASKS="$(grep -v '^syncforge-gradle-plugin:' "$COMPILE_FILE" | sed '/^$/d' | tr '\n' ' ' | sed 's/[[:space:]]*$//')"
          if [ -n "$ROOT_TASKS" ]; then
            # shellcheck disable=SC2086
            ./gradlew $ROOT_TASKS --no-daemon
          fi
          if grep -q '^syncforge-gradle-plugin:compileKotlin$' "$COMPILE_FILE"; then
            (cd syncforge-gradle-plugin && ../gradlew compileKotlin --no-daemon)
          fi

      - name: Compile BOM and KSP (full publish)
        if: github.event_name != 'workflow_dispatch' || inputs.publish_mode == 'full'
        run: ./gradlew :syncforge-bom:generatePomFileForMavenPublication :syncforge-ksp:compileKotlin --no-daemon

      - name: Prepare GPG signing key
        if: github.event_name != 'workflow_dispatch' || inputs.publish_mode == 'full' || steps.supplemental_plan.outputs.has_work == 'true'
        env:
          SIGNING_IN_MEMORY_KEY: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          SIGNING_IN_MEMORY_KEY_B64: ${{ secrets.SIGNING_IN_MEMORY_KEY_B64 }}
          SIGNING_IN_MEMORY_KEY_ID: ${{ secrets.SIGNING_IN_MEMORY_KEY_ID }}
          SIGNING_IN_MEMORY_KEY_PASSWORD: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          KEY_FILE_ARMOR="${RUNNER_TEMP}/gpg-signing-key.asc"
          KEY_FILE="${RUNNER_TEMP}/gpg-signing-key.gpg"
          if [ -n "${SIGNING_IN_MEMORY_KEY_B64:-}" ]; then
            echo "Using SIGNING_IN_MEMORY_KEY_B64"
            printf '%s' "$SIGNING_IN_MEMORY_KEY_B64" | base64 --decode > "$KEY_FILE_ARMOR"
          elif [ -n "${SIGNING_IN_MEMORY_KEY:-}" ]; then
            echo "Using SIGNING_IN_MEMORY_KEY"
            printf '%s\n' "$SIGNING_IN_MEMORY_KEY" > "$KEY_FILE_ARMOR"
          else
            echo "::error::No signing key secret found on this repository."
            echo "Add SIGNING_IN_MEMORY_KEY_B64 (recommended) or SIGNING_IN_MEMORY_KEY at:"
            echo "https://github.com/${{ github.repository }}/settings/secrets/actions"
            echo "Name must match exactly — not SIGN_IN_MEMORY_KEY."
            exit 1
          fi
          if ! grep -q "BEGIN PGP PRIVATE KEY BLOCK" "$KEY_FILE_ARMOR"; then
            echo "::error::Signing key file is not an armored PGP private key"
            exit 1
          fi
          # Gradle signing.secretKeyRingFile expects a binary keyring, not armored ASCII.
          gpg --batch --yes --dearmor -o "$KEY_FILE" < "$KEY_FILE_ARMOR"
          GNUPGHOME="$(mktemp -d)"
          chmod 700 "$GNUPGHOME"
          export GNUPGHOME
          gpg --batch --import "$KEY_FILE_ARMOR"
          KEY_ID="$(gpg --list-secret-keys --keyid-format long 2>/dev/null | awk '/^sec/ {split($2, parts, "/"); print parts[2]; exit}')"
          KEY_ID="${KEY_ID: -8}"
          if [ -n "${SIGNING_IN_MEMORY_KEY_ID:-}" ] && echo "${SIGNING_IN_MEMORY_KEY_ID}" | grep -qE '^[0-9A-Fa-f]{8}$'; then
            KEY_ID="${SIGNING_IN_MEMORY_KEY_ID}"
          fi
          if ! echo "$KEY_ID" | grep -qE '^[0-9A-Fa-f]{8}$'; then
            echo "::error::Could not derive a valid 8-char GPG key id. Set SIGNING_IN_MEMORY_KEY_ID to 1DF1CDEB (not Sonatype username)."
            exit 1
          fi
          echo "Signing key ready (armored=$(wc -c < "$KEY_FILE_ARMOR" | tr -d ' ') bytes, binary=$(wc -c < "$KEY_FILE" | tr -d ' ') bytes, keyId=${KEY_ID})"
          {
            echo "ORG_GRADLE_PROJECT_signing_secretKeyRingFile=${KEY_FILE}"
            echo "ORG_GRADLE_PROJECT_signing_keyId=${KEY_ID}"
          } >> "$GITHUB_ENV"
          {
            echo "signing.secretKeyRingFile=${KEY_FILE}"
            echo "signing.keyId=${KEY_ID}"
          } >> gradle.properties
          if [ -n "${SIGNING_IN_MEMORY_KEY_PASSWORD:-}" ]; then
            echo "ORG_GRADLE_PROJECT_signing_password=${SIGNING_IN_MEMORY_KEY_PASSWORD}" >> "$GITHUB_ENV"
            echo "signing.password=${SIGNING_IN_MEMORY_KEY_PASSWORD}" >> gradle.properties
          fi

      - name: Publish to Maven Central
        if: github.event_name != 'workflow_dispatch' || inputs.publish_mode == 'full' || steps.supplemental_plan.outputs.has_work == 'true'
        env:
          ORG_GRADLE_PROJECT_mavenCentralPublishing: "true"
          ORG_GRADLE_PROJECT_signAllPublications: "true"
          ORG_GRADLE_PROJECT_org.gradle.parallel: "false"
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
        run: |
          set -euo pipefail
          KEY_FILE="${RUNNER_TEMP}/gpg-signing-key.gpg"
          KEY_ID="$(grep '^signing.keyId=' gradle.properties | tail -1 | cut -d= -f2-)"
          if [ ! -f "$KEY_FILE" ] || [ -z "$KEY_ID" ]; then
            echo "::error::Signing key missing — Prepare GPG signing key step may have failed"
            exit 1
          fi
          SIGNING_ARGS=(
            "-Psigning.secretKeyRingFile=${KEY_FILE}"
            "-Psigning.keyId=${KEY_ID}"
          )
          if grep -q '^signing.password=' gradle.properties; then
            SIGNING_PASSWORD="$(grep '^signing.password=' gradle.properties | tail -1 | cut -d= -f2-)"
            SIGNING_ARGS+=("-Psigning.password=${SIGNING_PASSWORD}")
          fi
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.publish_mode }}" == "supplemental" ]]; then
            TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
            VERSION="${TAG#v}"
            PUBLISH_FILE="${{ steps.supplemental_plan.outputs.publish_tasks_file }}"
            PUBLISH_TASKS=()
            while IFS= read -r task || [ -n "$task" ]; do
              [ -z "$task" ] && continue
              PUBLISH_TASKS+=("$task")
            done <"$PUBLISH_FILE"
            if [ "${#PUBLISH_TASKS[@]}" -eq 0 ]; then
              echo "::error::Supplemental plan produced no publish tasks"
              exit 1
            fi
            # Guard against re-uploading coordinates already on Central (duplicate-version rejection).
            source .github/scripts/maven-central-artifacts-common.sh
            FILTERED_TASKS=()
            for task in "${PUBLISH_TASKS[@]}"; do
              case "$task" in
                *:syncforge:publishAndroidReleasePublicationToMavenCentralRepository)
                  artifact="syncforge-android" ;;
                *:syncforge-bom:publishMavenPublicationToMavenCentralRepository)
                  artifact="syncforge-bom" ;;
                *:syncforge-ksp:publishMavenPublicationToMavenCentralRepository)
                  artifact="syncforge-ksp" ;;
                *:syncforge:publishKotlinMultiplatformPublicationToMavenCentralRepository)
                  artifact="syncforge" ;;
                *:syncforge:publishJvmPublicationToMavenCentralRepository)
                  artifact="syncforge-jvm" ;;
                *:syncforge-annotations:publishKotlinMultiplatformPublicationToMavenCentralRepository)
                  artifact="syncforge-annotations" ;;
                *:syncforge-persistence:publishKotlinMultiplatformPublicationToMavenCentralRepository)
                  artifact="syncforge-persistence" ;;
                *:syncforge-android-deps:publishReleasePublicationToMavenCentralRepository)
                  artifact="syncforge-android-deps" ;;
                *)
                  FILTERED_TASKS+=("$task")
                  continue
                  ;;
              esac
              if maven_central_artifact_present "$artifact" "$VERSION"; then
                echo "SKIP ${artifact}:${VERSION} — already on Maven Central"
              else
                FILTERED_TASKS+=("$task")
              fi
            done
            if [ "${#FILTERED_TASKS[@]}" -eq 0 ]; then
              echo "All planned artifacts are already on Maven Central — nothing to upload."
              exit 0
            fi
            echo "Supplemental publish (${{ steps.supplemental_plan.outputs.missing_artifacts }}): ${FILTERED_TASKS[*]}"
            ./gradlew verifyPublishSigning "${FILTERED_TASKS[@]}" \
              --no-daemon --no-parallel "${SIGNING_ARGS[@]}"
            if [[ "$(cat "${{ steps.supplemental_plan.outputs.plugin_publish_file }}")" == "true" ]]; then
              (cd syncforge-gradle-plugin && ../gradlew verifyPublishSigning publishAllPublicationsToMavenCentralRepository \
                --no-daemon --no-parallel "${SIGNING_ARGS[@]}")
            fi
          else
            ./gradlew verifyPublishSigning publishAllToMavenCentral \
              --no-daemon --no-parallel "${SIGNING_ARGS[@]}"
            ./gradlew \
              :syncforge-bom:publishMavenPublicationToMavenCentralRepository \
              :syncforge-ksp:publishMavenPublicationToMavenCentralRepository \
              --no-daemon --no-parallel "${SIGNING_ARGS[@]}"
          fi

      - name: Supplemental publish skipped (already on Central)
        if: github.event_name == 'workflow_dispatch' && inputs.publish_mode == 'supplemental' && steps.supplemental_plan.outputs.has_work != 'true'
        run: echo "All required artifacts are already on Maven Central — nothing to upload."

      - name: Transfer staging upload to Central Portal
        if: github.event_name != 'workflow_dispatch' || inputs.publish_mode == 'full' || steps.supplemental_plan.outputs.has_work == 'true'
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          FINALIZE_CURRENT_IP: "true"
          DROP_INVALID_ON_FAILURE: "true"
          STRICT: "true"
        run: bash .github/scripts/finalize-maven-central-staging.sh studio.syncforge

      - name: Verify required artifacts on Maven Central
        env:
          MAVEN_CENTRAL_VERIFY_RETRIES: "20"
          MAVEN_CENTRAL_VERIFY_SLEEP_SEC: "30"
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          bash .github/scripts/verify-maven-central-artifacts.sh "$VERSION"