name: Publish Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish-macos:
    name: Maven Central (all KMP targets)
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Set release version from tag
        run: echo "syncforge.version=${GITHUB_REF_NAME#v}" >> gradle.properties

      - name: Compile all Kotlin targets (incl. iOS / macOS)
        run: |
          ./gradlew \
            :syncforge:compileDebugKotlinAndroid \
            :syncforge:compileKotlinJvm \
            :syncforge:compileKotlinIosSimulatorArm64 \
            :syncforge:compileKotlinMacosArm64 \
            :syncforge-persistence:compileDebugKotlinAndroid \
            :syncforge-persistence:compileKotlinJvm \
            :syncforge-persistence:compileKotlinIosSimulatorArm64 \
            :syncforge-persistence:compileKotlinMacosArm64 \
            :syncforge-annotations:compileKotlin \
            :syncforge-ksp:compileKotlin \
            --no-daemon

      - name: Test JVM
        run: ./gradlew :syncforge:jvmTest :syncforge-persistence:jvmTest --no-daemon

      - name: Publish to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralPublishing: "true"
          ORG_GRADLE_PROJECT_signAllPublications: "true"
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_IN_MEMORY_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
        run: ./gradlew publishAllToMavenCentral --no-daemon